name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      transcribe: ${{ steps.filter.outputs.transcribe }}
      audioforge: ${{ steps.filter.outputs.audioforge }}
      ocr: ${{ steps.filter.outputs.ocr }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            transcribe:
              - 'transcribe/**'
            audioforge:
              - 'audioforge/**'
            ocr:
              - 'ocr/**'

  test-transcribe:
    needs: changes
    if: needs.changes.outputs.transcribe == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Torch CPU
        run: pip install torch==2.10.0 torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Dependencies
        run: pip install -r transcribe/requirements.txt
      - name: Smoke-test
        run: python -c "import sys; sys.path.insert(0,'transcribe'); print('Transcribe OK')"

  test-audioforge:
    needs: changes
    if: needs.changes.outputs.audioforge == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Dependencies
        run: pip install -r audioforge/requirements.txt
      - name: Smoke-test
        run: python -c "import sys; sys.path.insert(0,'audioforge'); print('AudioForge OK')"

  test-ocr:
    needs: changes
    if: needs.changes.outputs.ocr == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Dependencies
        run: pip install -r ocr/requirements.txt
      - name: Smoke-test
        run: python ocr/smoke_test.py
